name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/qcm-ffvl-scraper-2iy74
      - claude/meteo-scraper-map-69G8g
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build static site
        env:
          # Use the live FFVL API when a key secret is configured; otherwise fall
          # back to the full static balise list (166 positions, no live wind).
          DATA_SOURCE: ${{ secrets.FFVL_API_KEY != '' && 'ffvl' || 'static' }}
          FFVL_API_KEY: ${{ secrets.FFVL_API_KEY }}
        run: node scripts/build-static.js
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
