name: Deploy QCM site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "qcm-site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution de déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # Active GitHub Pages (mode "GitHub Actions") automatiquement si besoin.
          enablement: true
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: qcm-site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
